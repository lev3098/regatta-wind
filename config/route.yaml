name: Залив Петра Великого — прогноз ветра
timezone: Asia/Vladivostok

forecast:
  source: wrf              # wrf | open-meteo  (wrf = локальный высокоразрешающий)
  wind_speed_unit: kn
  hours_ahead: 12          # горизонт фолбэка/OWM по умолчанию (в WRF выбирается кнопкой)
  tactical_window: [3, 5]  # ч от текущего момента -> подсветка жёлтым на графиках
  fallback_model: jma_seamless   # модель Open-Meteo для фолбэка (пока WRF не посчитан)

wrf:
  output_dir: wrf/output   # куда батч кладёт wrfout_d0X_*
  domain: d02              # d02 = 3 км, d03 = 1 км (точность выбирается кнопкой в UI)

# Область фиксирована на залив Петра Великого (Амурский, Уссурийский,
# Славянский заливы и острова). Обычно менять не нужно: 1 км нест покрывает
# все ориентиры ниже с запасом.
area:
  center_lat: 43.00
  center_lon: 131.75
  half_span_deg: 0.75

# Ориентиры (НЕ гоночные знаки): задают, что прогноз должен покрывать, и дают
# точки для реальных данных OWM и графиков. Координаты приблизительные — правь здесь.
landmarks:
  - {name: Мыс Песчаный, lat: 43.34, lon: 131.79}
  - {name: Бухта Миноносок, lat: 42.71, lon: 131.36}
  - {name: Остров Попова, lat: 42.95, lon: 131.73}
  - {name: Остров Аскольд, lat: 42.78, lon: 132.34}
  - {name: Кирпичный завод, lat: 43.23, lon: 132.05}
